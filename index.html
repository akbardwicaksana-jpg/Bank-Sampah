<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoBank Sampah</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 0;
    }
    header {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    main { max-width: 900px; margin: auto; padding: 20px; }
    .card {
      background: #111827;
      padding: 18px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
      margin-bottom: 20px;
      border: 1px solid #1f2933;
    }
    h2 { margin-top: 0; color: #22c55e; }
    input, select, button {
      padding: 12px;
      margin-top: 10px;
      width: 100%;
      border-radius: 10px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
    }
    input::placeholder { color: #6b7280; }
    button {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      transform: scale(1.02);
      background: linear-gradient(135deg, #16a34a, #15803d);
    }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #1f2937; padding: 10px; text-align: center; }
    th { background: #16a34a; color: white; }
    tr:nth-child(even) { background: #020617; }
    footer { text-align: center; padding: 12px; color: #9ca3af; font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <h1>EcoBank Sampah</h1>
    <p>Menabung Sampah, Dapat Uang!</p>
  </header>

  <main>
    <!-- Form Input Sampah -->
    <div class="card">
      <h2>Setor Sampah</h2>
      <label>Nama</label>
      <input type="text" id="nama" placeholder="Masukkan nama" />

      <label>Jenis Sampah</label>
      <select id="jenis">
        <option value="plastik">Plastik</option>
        <option value="kertas">Kertas</option>
        <option value="logam">Logam</option>
        <option value="organik">Organik</option>
      </select>

      <label>Berat (kg)</label>
      <input type="number" id="berat" placeholder="Contoh: 2" />

      <button onclick="tambahSetoran()">Tambahkan</button>
    </div>

    <!-- Saldo -->
    <div class="card">
      <h2>Saldo Uang</h2>
      <h3 id="saldo">Rp 0</h3>
    </div>

    <!-- Riwayat Setoran -->
    <div class="card">
      <h2>Riwayat Setoran Sampah</h2>
      <table>
        <thead>
          <tr>
            <th>Nama</th>
            <th>Jenis Sampah</th>
            <th>Berat (kg)</th>
            <th>Uang (Rp)</th>
          </tr>
        </thead>
        <tbody id="riwayat"></tbody>
      </table>
    </div>
  </main>

  <footer>
    <p>Proyek Website Bank Sampah - Demo Sekolah</p>
  </footer>

  <script>
    let totalSaldo = 0;

    // Harga per kg
    const harga = {
      plastik: 3000,
      kertas: 2000,
      logam: 5000,
      organik: 1000
    };

    function tambahSetoran() {
      const nama = document.getElementById('nama').value;
      const jenis = document.getElementById('jenis').value;
      const berat = parseFloat(document.getElementById('berat').value);

      if (!nama || !berat) {
        alert('Isi nama dan berat sampah!');
        return;
      }

      const uang = berat * harga[jenis];
      totalSaldo += uang;

      // Update saldo
      document.getElementById('saldo').innerText = 'Rp ' + totalSaldo.toLocaleString();

      // Tambah ke tabel
      const row = `<tr>
        <td>${nama}</td>
        <td>${jenis}</td>
        <td>${berat}</td>
        <td>Rp ${uang.toLocaleString()}</td>
      </tr>`;
      document.getElementById('riwayat').innerHTML += row;

      // Reset form
      document.getElementById('nama').value = '';
      document.getElementById('berat').value = '';
    }
  </script>
</body>
</html>
